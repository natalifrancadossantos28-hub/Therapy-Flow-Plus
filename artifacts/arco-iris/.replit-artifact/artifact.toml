kind = "web"
previewPath = "/"
title = "Arco-Íris Gestão"
version = "1.0.0"
id = "artifacts/arco-iris"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21917
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/arco-iris run dev"

[services.env]
PORT = "21917"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/arco-iris", "run", "build"]
publicDir = "artifacts/arco-iris/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
