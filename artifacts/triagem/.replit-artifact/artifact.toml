kind = "web"
previewPath = "/triagem/"
title = "NFs – Triagem Multidisciplinar"
version = "1.0.0"
id = "artifacts/triagem"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/triagem/" ]
localPort = 20171

[services.development]
run = "pnpm --filter @workspace/triagem run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/triagem", "run", "build" ]
publicDir = "artifacts/triagem/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20171"
BASE_PATH = "/triagem/"
